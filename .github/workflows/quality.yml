name: GeoAware Quality Gate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Build, test, security, and static validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install application and audit dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pip-audit
      - name: API contract tests
        run: pytest -q
      - name: Static application contract
        run: python scripts/validate_static.py
      - name: JavaScript syntax
        run: node --check app.js
      - name: Dependency security audit
        run: pip-audit -r requirements.txt
